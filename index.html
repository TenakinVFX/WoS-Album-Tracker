<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WS Album Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg0: #060e1c; --bg1: #0a1628; --bg2: #0d1f3c; --bg3: #112038; --bg4: #0b1a30;
    --border: #1a3358; --border2: #112038;
    --accent: #2e89c8; --accent-dim: #1e5f94; --accent-bright: #5bbde8;
    --text-primary: #d4eaff; --text-secondary: #7fa8cc; --text-muted: #3d5e80; --text-num: #7ec8f0;
    --done-bg: #0d2040; --done-border: #1e4a7a; --done-text: #4aadee; --complete-border: #2e6aad;
    --ice1: #b8d9f5;
    --trade-in: #0d2a1a; --trade-in-border: #1a5e35; --trade-in-text: #4aee8a;
    --trade-out: #2a1a0d; --trade-out-border: #7a4a1a; --trade-out-text: #eea84a;
  }
  html { height: 100%; }
  body { min-height: 100%; background: var(--bg0); color: var(--text-primary); font-family: 'Barlow', sans-serif; font-size: 14px; line-height: 1.5; overflow-x: hidden; }
  #snow-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.35; }
  .crystal-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .crystal-bg svg { position: absolute; opacity: 0.03; }

  /* Header */
  .site-header { position: sticky; top: 0; z-index: 100; background: rgba(6,14,28,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 20px; }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 16px; height: 56px; flex-wrap: wrap; }
  .site-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .logo-text { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--text-primary); letter-spacing: 0.03em; line-height: 1; }
  .header-stats { display: flex; align-items: center; gap: 20px; }
  .hstat { display: flex; flex-direction: column; align-items: flex-end; }
  .hstat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 600; color: var(--text-num); line-height: 1; }
  .hstat-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; }
  .hstat-sep { width: 1px; height: 28px; background: var(--border); }
  .header-right { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }
  .account-btn { display: flex; align-items: center; gap: 7px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); cursor: pointer; padding: 6px 11px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; transition: background 0.15s, color 0.15s; }
  .account-btn:hover { background: var(--bg3); color: var(--text-primary); }
  .account-btn .dot { width: 7px; height: 7px; border-radius: 50%; background: #3aaa5c; flex-shrink: 0; transition: background 0.3s; }
  .account-btn .dot.offline { background: var(--text-muted); }
  .sync-indicator { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 0.05em; color: var(--text-muted); white-space: nowrap; transition: color 0.3s; }
  .sync-indicator.syncing { color: var(--accent-bright); animation: pulse-text 1.2s ease-in-out infinite; }
  .sync-indicator.saved { color: #3aaa5c; }
  @keyframes pulse-text { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Page nav tabs */
  .page-nav { background: var(--bg1); border-bottom: 1px solid var(--border); position: relative; z-index: 99; }
  .page-nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; }
  .page-tab { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 12px 20px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; display: flex; align-items: center; gap: 7px; }
  .page-tab:hover { color: var(--text-secondary); }
  .page-tab.active { color: var(--accent-bright); border-bottom-color: var(--accent); }

  /* Progress strip */
  .progress-strip { background: var(--bg1); border-bottom: 1px solid var(--border2); padding: 10px 20px; position: relative; z-index: 1; }
  .progress-strip-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 14px; }
  .progress-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); white-space: nowrap; letter-spacing: 0.05em; text-transform: uppercase; }
  .progress-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 99px; overflow: hidden; border: 1px solid var(--border2); }
  .progress-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.4s ease; position: relative; }
  .progress-fill::after { content: ''; position: absolute; right: 0; top: 0; width: 6px; height: 100%; background: var(--accent-bright); border-radius: 99px; }
  .progress-pct { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; color: var(--accent-bright); min-width: 38px; text-align: right; white-space: nowrap; }

  /* Toolbar */
  .toolbar { max-width: 1200px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; position: relative; z-index: 1; }
  .filter-group { display: flex; align-items: center; gap: 6px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .fbtn { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; padding: 5px 12px; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
  .fbtn:hover { color: var(--text-secondary); background: var(--bg3); }
  .fbtn.active { background: var(--accent-dim); color: var(--ice1); }
  .tbtn { display: inline-flex; align-items: center; gap: 6px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; padding: 7px 13px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
  .tbtn:hover { background: var(--bg3); color: var(--text-primary); }
  .tbtn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .tbtn-accent { border-color: var(--accent-dim); color: var(--accent-bright); }
  .tbtn-accent:hover { background: rgba(46,137,200,0.12); }
  .tbtn-reset { margin-left: auto; }
  .search-wrap { position: relative; flex: 1; max-width: 260px; }
  .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; stroke: var(--text-muted); fill: none; stroke-width: 2; stroke-linecap: round; }
  #search-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: 'Barlow', sans-serif; font-size: 13px; padding: 7px 10px 7px 30px; outline: none; transition: border-color 0.15s; }
  #search-input::placeholder { color: var(--text-muted); }
  #search-input:focus { border-color: var(--accent-dim); }

  /* Album grid */
  .album-grid { max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; position: relative; z-index: 1; }
  .album-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.25s; }
  .album-card.complete { border-color: var(--complete-border); }
  .album-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; user-select: none; background: var(--bg4); border-bottom: 1px solid var(--border2); transition: background 0.15s; }
  .album-header:hover { background: var(--bg3); }
  .album-thumb { width: 40px; height: 40px; border-radius: 6px; flex-shrink: 0; background: var(--bg3); border: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-muted); }
  .album-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .album-thumb img.errored { display: none; }
  .album-num { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; color: var(--accent); background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 2px 6px; letter-spacing: 0.06em; flex-shrink: 0; }
  .album-name { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.03em; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .album-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .album-pct { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); white-space: nowrap; }
  .album-pct.done { color: var(--done-text); }
  .chevron { width: 14px; height: 14px; stroke: var(--text-muted); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; transition: transform 0.2s; flex-shrink: 0; }
  .album-card.open .chevron { transform: rotate(180deg); }
  .album-body { display: none; padding: 10px 14px 14px; }
  .album-card.open .album-body { display: block; }
  .album-progress-bar { height: 3px; background: var(--bg3); border-radius: 99px; overflow: hidden; margin-bottom: 10px; }
  .album-progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s; }
  .puzzle-list { display: flex; flex-direction: column; gap: 5px; }
  .puzzle-row { padding: 8px 9px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg1); transition: background 0.15s, border-color 0.15s; }
  .puzzle-row.done { background: var(--done-bg); border-color: var(--done-border); }
  .puzzle-row-top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .puzzle-name { flex: 1; font-size: 12px; color: var(--text-secondary); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .puzzle-row.done .puzzle-name { color: var(--accent-bright); }
  .puzzle-count { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
  .puzzle-row.done .puzzle-count { color: var(--done-text); }
  .max-btn { height: 20px; padding: 0 7px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg2); color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; cursor: pointer; display: flex; align-items: center; transition: all 0.1s; white-space: nowrap; -webkit-tap-highlight-color: transparent; touch-action: manipulation; flex-shrink: 0; }
  .max-btn:hover { background: var(--accent-dim); color: var(--ice1); border-color: var(--accent); }
  .puzzle-row.done .max-btn { opacity: 0.35; pointer-events: none; }
  .shard-grid { display: flex; flex-wrap: wrap; gap: 4px; }
  .shard-pip { width: 26px; height: 26px; border-radius: 5px; border: 1.5px solid var(--border); background: var(--bg3); cursor: pointer; transition: background 0.1s, border-color 0.1s, transform 0.08s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; flex-shrink: 0; position: relative; display: flex; align-items: center; justify-content: center; }
  .shard-pip:hover { border-color: var(--accent-dim); }
  .shard-pip:active { transform: scale(0.88); }
  .shard-num { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; color: var(--text-muted); line-height: 1; pointer-events: none; user-select: none; }
  .shard-pip.filled { background: var(--accent); border-color: var(--accent-bright); }
  .shard-pip.filled .shard-num { color: rgba(255,255,255,0.5); }
  .shard-pip.filled::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.9); }
  .album-actions { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .album-act-btn { display: inline-flex; align-items: center; gap: 5px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; padding: 5px 11px; border-radius: 7px; border: 1px solid var(--border); background: var(--bg3); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .album-act-btn:hover { background: var(--bg2); color: var(--text-primary); }
  .album-act-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .album-act-btn.maxall { border-color: var(--accent-dim); color: var(--accent-bright); }
  .album-act-btn.maxall:hover { background: rgba(46,137,200,0.12); }

  /* Trade Board */
  #page-trade { display: none; max-width: 1200px; margin: 0 auto; padding: 20px 20px 80px; position: relative; z-index: 1; }
  .trade-profile-banner { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .trade-profile-banner.set { border-color: var(--accent-dim); }
  .trade-banner-icon { width: 42px; height: 42px; border-radius: 10px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .trade-banner-text { flex: 1; min-width: 180px; }
  .trade-banner-title { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.04em; margin-bottom: 2px; }
  .trade-banner-sub { font-size: 12px; color: var(--text-muted); }
  .trade-banner-sub strong { color: var(--accent-bright); }
  .trade-profile-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.05em; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--accent-dim); background: rgba(46,137,200,0.1); color: var(--accent-bright); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .trade-profile-btn:hover { background: rgba(46,137,200,0.2); }
  .trade-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
  .trade-tab { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.05em; padding: 9px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--text-muted); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
  .trade-tab:hover { color: var(--text-secondary); background: var(--bg3); }
  .trade-tab.active-in { border-color: var(--trade-in-border); background: var(--trade-in); color: var(--trade-in-text); }
  .trade-tab.active-out { border-color: var(--trade-out-border); background: var(--trade-out); color: var(--trade-out-text); }
  .trade-tab .tt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: currentColor; }
  .trade-content { display: flex; flex-direction: column; gap: 10px; }
  .trade-no-profile { text-align: center; padding: 48px 20px; color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; letter-spacing: 0.05em; }
  .trade-loading { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; letter-spacing: 0.04em; animation: pulse-text 1.2s infinite; }
  .trade-empty { text-align: center; padding: 48px 20px; color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 15px; letter-spacing: 0.04em; line-height: 1.8; }
  .trade-player-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .trade-player-header { padding: 12px 16px; background: var(--bg4); border-bottom: 1px solid var(--border2); display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; transition: background 0.15s; }
  .trade-player-header:hover { background: var(--bg3); }
  .trade-player-avatar { width: 36px; height: 36px; border-radius: 8px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--ice1); flex-shrink: 0; }
  .trade-player-info { flex: 1; min-width: 0; }
  .trade-player-name { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.03em; }
  .trade-player-meta { font-size: 11px; color: var(--text-muted); }
  .trade-player-meta strong { color: var(--accent-bright); }
  .trade-player-chevron { width: 14px; height: 14px; stroke: var(--text-muted); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; transition: transform 0.2s; flex-shrink: 0; }
  .trade-player-card.open .trade-player-chevron { transform: rotate(180deg); }
  .trade-player-body { display: none; padding: 12px 16px 16px; }
  .trade-player-card.open .trade-player-body { display: block; }
  .trade-album-section { margin-bottom: 12px; }
  .trade-album-section:last-child { margin-bottom: 0; }
  .trade-album-name { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .trade-puzzle-row { padding: 7px 10px; border-radius: 7px; border: 1px solid var(--border2); background: var(--bg1); margin-bottom: 5px; }
  .trade-puzzle-row:last-child { margin-bottom: 0; }
  .trade-puzzle-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
  .trade-shard-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .trade-shard-pip { width: 26px; height: 26px; border-radius: 5px; border: 1.5px solid; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; flex-shrink: 0; }
  .trade-shard-pip.incoming { background: var(--trade-in); border-color: var(--trade-in-border); color: var(--trade-in-text); }
  .trade-shard-pip.outgoing { background: var(--trade-out); border-color: var(--trade-out-border); color: var(--trade-out-text); }

  /* Auth modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 10000; }
  .modal { background: var(--bg1); border: 1px solid var(--border); border-radius: 12px; width: 400px; max-width: 95vw; overflow: hidden; }
  .modal-header { background: var(--bg0); padding: 16px 20px; border-bottom: 1px solid var(--border2); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.04em; }
  .modal-close { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 4px 7px; border-radius: 4px; line-height: 1; transition: background 0.15s, color 0.15s; }
  .modal-close:hover { background: rgba(232,17,35,0.3); color: var(--text-primary); }
  .modal-body { padding: 22px 24px; }
  .auth-tabs { display: grid; grid-template-columns: 1fr 1fr; background: var(--bg3); border-radius: 8px; padding: 3px; margin-bottom: 20px; }
  .auth-tab { padding: 8px; border: none; border-radius: 6px; background: transparent; color: var(--text-muted); cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; transition: all 0.15s; }
  .auth-tab.active { background: var(--accent-dim); color: var(--ice1); }
  .field-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: block; letter-spacing: 0.06em; text-transform: uppercase; }
  .field-input { width: 100%; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-family: 'Barlow', sans-serif; font-size: 13px; margin-bottom: 14px; caret-color: var(--accent-bright); outline: none; transition: border-color 0.15s; }
  .field-input:focus { border-color: var(--accent-dim); }
  .auth-action-btn { width: 100%; padding: 11px; background: var(--accent-dim); border: none; border-radius: 8px; color: var(--ice1); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.05em; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
  .auth-action-btn:hover { background: var(--accent); }
  .auth-action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .forgot-link { display: block; text-align: right; font-size: 11px; color: var(--accent-dim); cursor: pointer; margin-top: -8px; margin-bottom: 16px; }
  .forgot-link:hover { color: var(--accent-bright); }
  .alert-banner { padding: 10px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 14px; display: none; font-family: 'Barlow', sans-serif; }
  .alert-error { background: rgba(180,40,40,0.15); border: 1px solid rgba(180,40,40,0.4); color: #ff8080; display: block; }
  .alert-success { background: rgba(40,140,80,0.15); border: 1px solid rgba(40,140,80,0.4); color: #80e0a0; display: block; }
  .auth-subtitle { font-size: 12px; color: var(--text-muted); text-align: center; margin-bottom: 20px; line-height: 1.5; }
  .field-hint { font-size: 11px; color: var(--text-muted); margin-top: -10px; margin-bottom: 14px; line-height: 1.4; }

  /* Dropdown */
  .dropdown-menu { position: fixed; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); z-index: 9000; min-width: 210px; padding: 4px 0; }
  .dropdown-email { padding: 10px 14px; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border2); margin-bottom: 4px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.04em; }
  .ctx-item { width: 100%; padding: 9px 14px; background: transparent; border: none; color: var(--text-secondary); text-align: left; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; display: flex; align-items: center; gap: 8px; transition: background 0.12s, color 0.12s; }
  .ctx-item:hover { background: var(--bg3); color: var(--text-primary); }
  .ctx-item.danger { color: #e05555; }
  .ctx-item.danger:hover { background: rgba(200,40,40,0.15); }
  .ctx-sep { border: none; border-top: 1px solid var(--border2); margin: 3px 0; }

  #import-file { display: none; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(70px); background: var(--bg2); color: var(--accent-bright); border: 1px solid var(--accent-dim); padding: 9px 20px; border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.04em; z-index: 9999; transition: transform 0.3s ease; pointer-events: none; white-space: nowrap; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
  #toast.show { transform: translateX(-50%) translateY(0); }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 48px 20px; color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; letter-spacing: 0.05em; }

  @media (max-width: 600px) {
    .header-inner { height: auto; padding: 10px 0; gap: 10px; }
    .header-stats { gap: 12px; }
    .hstat-val { font-size: 15px; }
    .album-grid { grid-template-columns: 1fr; padding: 0 12px 60px; }
    .toolbar { padding: 10px 12px; gap: 6px; }
    .search-wrap { max-width: 100%; order: -1; flex: 0 0 100%; }
    .tbtn-reset { margin-left: 0; }
    .progress-strip { padding: 8px 12px; }
    .site-header { padding: 0 12px; }
    .sync-indicator { display: none; }
    #page-trade { padding: 12px 12px 60px; }
    .page-nav-inner { padding: 0 12px; }
    .page-tab { padding: 10px 14px; font-size: 13px; }
  }
  @media (max-width: 400px) { .header-stats { display: none; } }
</style>
</head>

// ═══════════════════════════════════════════════
function load() {
  try { const s = localStorage.getItem(SK); if (s) state = JSON.parse(s); } catch(e) {}
  ALBUMS.forEach((_, ai) => {
    if (!state[ai]) state[ai] = {};
    ALBUMS[ai].p.forEach((p, pi) => {
      if (!Array.isArray(state[ai][pi])) {
        const old = state[ai][pi] || 0;
        state[ai][pi] = Array(p[1]).fill(false).map((_, i) => i < old);
      }
      if (state[ai][pi].length !== p[1]) {
        const arr = Array(p[1]).fill(false);
        state[ai][pi].forEach((v, i) => { if (i < p[1]) arr[i] = v; });
        state[ai][pi] = arr;
      }
    });
  });
}

function saveLocal() {
  try {
    localStorage.setItem(SK, JSON.stringify(state));
    localStorage.setItem(SK_TIME, new Date().toISOString());
  } catch(e) {}
}

// CLOUD SYNC
// ═══════════════════════════════════════════════
function setSyncStatus(msg, cls) {
  const el = document.getElementById('sync-indicator');
  el.textContent = msg;
  el.className = 'sync-indicator' + (cls ? ' ' + cls : '');
}

function schedulePush() {
  if (!currentUser) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToCloud, 1500);
}

async function pushToCloud() {
  if (!currentUser) return;
  setSyncStatus('Saving…', 'syncing');
  try {
    const { error } = await sb
      .from('ws_tracker_progress')
      .upsert({ user_id: currentUser.id, data: state }, { onConflict: 'user_id' });
    if (error) throw error;
    setSyncStatus('Saved ✓', 'saved');
    setTimeout(() => setSyncStatus(''), 3000);
  } catch(e) {
    setSyncStatus('Sync failed', '');
    console.error('[WS Tracker] push failed:', e.message);
  }
}

async function pullFromCloud() {
  if (!currentUser) return;
  setSyncStatus('Loading…', 'syncing');
  try {
    const { data, error } = await sb
      .from('ws_tracker_progress')
      .select('data, updated_at')
      .eq('user_id', currentUser.id)
      .maybeSingle();
    if (error) throw error;
    if (data?.data) {
      const cloudTime = new Date(data.updated_at);
      const localTimeStr = localStorage.getItem(SK_TIME);
      const localTime = localTimeStr ? new Date(localTimeStr) : new Date(0);
      if (!localTimeStr || cloudTime > localTime) {
        state = data.data;
        normaliseState();
        saveLocal();
        buildGrid();
        updateGlobal();
        setSyncStatus('Loaded from cloud ✓', 'saved');
        setTimeout(() => setSyncStatus(''), 3000);
      } else if (localTime > cloudTime) {
        await pushToCloud();
      } else {
        setSyncStatus('Up to date ✓', 'saved');
        setTimeout(() => setSyncStatus(''), 3000);
      }
    } else {
      await pushToCloud();
    }
  } catch(e) {
    setSyncStatus('Sync error', '');
    console.error('[WS Tracker] pull failed:', e.message);
  }
}

async function pushTradeableShards() {
  if (!currentUser || !tradeProfile) return;
  const missingData = {};
  const haveData = {};
  ALBUMS.forEach((album, ai) => {
    ALBUMS[ai].p.forEach((p, pi) => {
      const shards = state[ai][pi] || [];
      const missing = shards.map((v, i) => v ? null : i+1).filter(n => n !== null && !isFiveStar(ai, pi, n));
      const have = shards.map((v, i) => v ? i+1 : null).filter(n => n !== null && !isFiveStar(ai, pi, n));
      if (missing.length) { if (!missingData[ai]) missingData[ai]={}; missingData[ai][pi]=missing; }
      if (have.length) { if (!haveData[ai]) haveData[ai]={}; haveData[ai][pi]=have; }
    });
  });
  try {
    await sb.from('ws_trade_profiles').upsert({
      user_id: currentUser.id,
      game_name: tradeProfile.game_name,
      state_number: tradeProfile.state_number,
      missing_shards: missingData,
      have_shards: haveData,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
  } catch(e) {
    console.error('[WS Tracker] trade shard push failed:', e.message);
  }
}

function getMyMissingTradeable() {
  const out = {};
  ALBUMS.forEach((_, ai) => {
    ALBUMS[ai].p.forEach((p, pi) => {
      const missing = (state[ai][pi]||[]).map((v,i)=>v?null:i+1).filter(n=>n!==null&&!isFiveStar(ai,pi,n));
      if (missing.length) { if (!out[ai]) out[ai]={}; out[ai][pi]=missing; }
    });
  });
  return out;
}

function getMyHaveTradeable() {
  const out = {};
  ALBUMS.forEach((_, ai) => {
    ALBUMS[ai].p.forEach((p, pi) => {
      const have = (state[ai][pi]||[]).map((v,i)=>v?i+1:null).filter(n=>n!==null&&!isFiveStar(ai,pi,n));
      if (have.length) { if (!out[ai]) out[ai]={}; out[ai][pi]=have; }
    });
  });
  return out;
}

function renderTradeContent() {
  const container = document.getElementById('trade-content');
  if (!tradePlayersCache) return;
  if (tradePlayersCache.length === 0) {
    container.innerHTML = `<div class="trade-empty">No other players found in state #${tradeProfile.state_number} yet.<br>Share the tracker with your state-mates!</div>`;
    return;
  }
  const myMissing = getMyMissingTradeable();
  const myHave = getMyHaveTradeable();
  let results = [];

  tradePlayersCache.forEach(player => {
const playerHave = typeof player.have_shards === 'string' ? JSON.parse(player.have_shards) : (player.have_shards || {});
const playerMissing = typeof player.missing_shards === 'string' ? JSON.parse(player.missing_shards) : (player.missing_shards || {});
    let matchedAlbums = {};
    ALBUMS.forEach((album, ai) => {
      ALBUMS[ai].p.forEach((p, pi) => {
        let matches = [];
        if (tradeTab === 'in') {
          const theyHave = playerHave[ai]?.[pi] || [];
          const iNeed = myMissing[ai]?.[pi] || [];
          matches = theyHave.filter(s => iNeed.includes(s));
        } else {
          const iHave = myHave[ai]?.[pi] || [];
          const theyNeed = playerMissing[ai]?.[pi] || [];
          matches = iHave.filter(s => theyNeed.includes(s));
        }
        if (matches.length) { if (!matchedAlbums[ai]) matchedAlbums[ai]={}; matchedAlbums[ai][pi]=matches; }
      });
    });
    const totalMatches = Object.values(matchedAlbums).reduce((s,p)=>s+Object.values(p).reduce((s2,a)=>s2+a.length,0),0);
    if (totalMatches > 0) results.push({ player, matchedAlbums, totalMatches });
  });

  if (results.length === 0) {
    const msg = tradeTab === 'in' ? 'No state-mates have shards you need right now.' : 'No state-mates need shards you have right now.';
    container.innerHTML = `<div class="trade-empty">${msg}</div>`;
    return;
  }

  results.sort((a,b) => b.totalMatches - a.totalMatches);
  container.innerHTML = '';

  results.forEach(({ player, matchedAlbums, totalMatches }) => {
    const card = document.createElement('div');
    card.className = 'trade-player-card';
    const initials = player.game_name.slice(0,2).toUpperCase();
    const lastSeen = formatRelativeTime(player.updated_at);
    const pipClass = tradeTab === 'in' ? 'incoming' : 'outgoing';
    const tabLabel = tradeTab === 'in' ? 'shards they have you need' : 'shards you have they need';

    let bodyHtml = '';
    ALBUMS.forEach((album, ai) => {
      if (!matchedAlbums[ai]) return;
      let puzzleHtml = '';
      ALBUMS[ai].p.forEach((p, pi) => {
        const shards = matchedAlbums[ai]?.[pi];
        if (!shards?.length) return;
        const pips = shards.map(s=>`<div class="trade-shard-pip ${pipClass}">${s}</div>`).join('');
        puzzleHtml += `<div class="trade-puzzle-row"><div class="trade-puzzle-label">${p[0]}</div><div class="trade-shard-list">${pips}</div></div>`;
      });
      if (puzzleHtml) bodyHtml += `<div class="trade-album-section"><div class="trade-album-name">${album.name}</div>${puzzleHtml}</div>`;
    });

    card.innerHTML = `
      <div class="trade-player-header" onclick="this.closest('.trade-player-card').classList.toggle('open')">
        <div class="trade-player-avatar">${initials}</div>
        <div class="trade-player-info">
          <div class="trade-player-name">${escHtml(player.game_name)}</div>
          <div class="trade-player-meta"><strong>${totalMatches}</strong> ${tabLabel} · Updated ${lastSeen}</div>
        </div>
        <svg class="trade-player-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="trade-player-body">${bodyHtml}</div>`;
    container.appendChild(card);
  });
}

function formatRelativeTime(iso) {
  if (!iso) return 'unknown';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 2) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hours = Math.floor(mins/60);
  if (hours < 24) return `${hours}h ago`;
  return `${Math.floor(hours/24)}d ago`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

      </div>
      <div class="modal-body">
        <div class="auth-tabs">
          <button class="auth-tab ${isIn?'active':''}" onclick="_authMode('signin')">Sign In</button>
          <button class="auth-tab ${isUp?'active':''}" onclick="_authMode('signup')">Create Account</button>
        </div>
        <p class="auth-subtitle">${isIn ? 'Sign in to sync your progress across devices.' : 'Free account — your progress syncs automatically.'}</p>
        <div id="_authAlert" class="alert-banner"></div>
        <label class="field-label">Email</label>
        <input class="field-input" type="email" id="_authEmail" placeholder="you@example.com" onkeydown="if(event.key==='Enter')_authSubmit()">
        ${mode !== 'reset' ? `
        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="_authPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')_authSubmit()">
        ${isIn ? `<span class="forgot-link" onclick="_authMode('reset')">Forgot password?</span>` : ''}
        ` : `<p class="field-hint">Enter your email and we'll send a reset link.</p>`}
        <button class="auth-action-btn" id="_authBtn" onclick="_authSubmit()">
          ${isIn ? 'Sign In' : isUp ? 'Create Account' : 'Send Reset Email'}
        </button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('_authEmail')?.focus(), 50);
  }

  window._authMode = (m) => { mode = m; render(); };
  window._authSubmit = async () => {
    const email = document.getElementById('_authEmail')?.value.trim();
    const pw = document.getElementById('_authPw')?.value;
    const btn = document.getElementById('_authBtn');
    const alertEl = document.getElementById('_authAlert');
    if (!email) return _showAuthAlert('Please enter your email.', 'error');
    btn.disabled = true; btn.textContent = 'Please wait…';
    alertEl.className = 'alert-banner';
    try {
      if (mode === 'signin') {
        if (!pw) { _showAuthAlert('Please enter your password.', 'error'); btn.disabled=false; btn.textContent='Sign In'; return; }
        const { error } = await sb.auth.signInWithPassword({ email, password: pw });
        if (error) throw error;
        const { data: { session } } = await sb.auth.getSession();
        currentUser = session?.user ?? null;
        updateAccountUI();
        closeAllOverlays();
        await pullFromCloud();
        await loadTradeProfile();
        updateTradeProfileBanner();
      } else if (mode === 'signup') {
        if (!pw || pw.length < 6) { _showAuthAlert('Password must be at least 6 characters.', 'error'); btn.disabled=false; btn.textContent='Create Account'; return; }
        const { data, error } = await sb.auth.signUp({ email, password: pw });
        if (error) throw error;
        if (data?.session) {
          currentUser = data.session.user;
          updateAccountUI();
          closeAllOverlays();
          await pushToCloud();
          showTradeProfileModal();
        } else {
          _showAuthAlert('Account created! Check your email to confirm, then sign in.', 'success');
          window._authMode('signin');
        }
      } else if (mode === 'reset') {
        const { error } = await sb.auth.resetPasswordForEmail(email);
        if (error) throw error;
        _showAuthAlert('Reset email sent! Check your inbox.', 'success');
      }
    } catch(err) {
      _showAuthAlert(cleanAuthError(err.message), 'error');
    }
    btn.disabled = false;
    btn.textContent = mode==='signin' ? 'Sign In' : mode==='signup' ? 'Create Account' : 'Send Reset Email';
  };

  function _showAuthAlert(msg, type) {
    const el = document.getElementById('_authAlert');
    if (!el) return;
    el.textContent = msg;
    el.className = 'alert-banner alert-' + type;
  }

  render();
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeAllOverlays(); });
}

function cleanAuthError(msg) {
  if (msg.includes('Invalid login credentials')) return 'Invalid email or password.';
  if (msg.includes('User already registered')) return 'An account with this email already exists.';
  if (msg.includes('Password should be at least')) return 'Password must be at least 6 characters.';
  return msg;
}

async function signOut() {
  closeAllOverlays();
  await sb.auth.signOut();
  currentUser = null;
  tradeProfile = null;
  tradePlayersCache = null;
  updateAccountUI();
  updateTradeProfileBanner();
  setSyncStatus('');
  toast('Signed out.');
}

function closeAllOverlays() {
  ['_authModal','_acctDrop','_tradeProfileModal'].forEach(id => document.getElementById(id)?.remove());
  document.removeEventListener('click', closeAllOverlays);
}

// ═══════════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════════
function save() {
  saveLocal();
  schedulePush();
  if (currentUser && tradeProfile) {
    clearTimeout(window._tradeTimer);
    window._tradeTimer = setTimeout(pushTradeableShards, 3000);
  }
}

// ═══════════════════════════════════════════════
// STATE HELPERS
// ═══════════════════════════════════════════════
function normaliseState() {
  ALBUMS.forEach((_, ai) => {
    if (!state[ai]) state[ai] = {};
    ALBUMS[ai].p.forEach((p, pi) => {
      if (!Array.isArray(state[ai][pi])) {
        const old = state[ai][pi] || 0;
        state[ai][pi] = Array(p[1]).fill(false).map((_, i) => i < old);
      }
      if (state[ai][pi].length !== p[1]) {
        const arr = Array(p[1]).fill(false);
        state[ai][pi].forEach((v, i) => { if (i < p[1]) arr[i] = v; });
        state[ai][pi] = arr;
      }
    });
  });
}

function puzzleCount(ai, pi) { return (state[ai][pi] || []).filter(Boolean).length; }
function albumStats(ai) {
  let got = 0, tot = 0, done = 0;
  ALBUMS[ai].p.forEach((p, pi) => { const c = puzzleCount(ai, pi); got += c; tot += p[1]; if (c >= p[1]) done++; });
  return { got, tot, done, count: ALBUMS[ai].p.length };
}
function globalStats() {
  let gs = 0, ts = 0, gp = 0, tp = 0, ga = 0;
  ALBUMS.forEach((_, ai) => { const s = albumStats(ai); gs += s.got; ts += s.tot; gp += s.done; tp += s.count; if (s.done === s.count) ga++; });
  return { gs, ts, gp, tp, ga };
}

function updateGlobal() {
  const g = globalStats();
  document.getElementById('h-albums').textContent = g.ga + '/16';
  document.getElementById('h-puzzles').textContent = g.gp + '/' + g.tp;
  document.getElementById('h-shards').textContent = g.gs + '/' + g.ts;
  const pct = g.ts > 0 ? Math.round(g.gs / g.ts * 100) : 0;
  document.getElementById('g-pct').textContent = pct + '%';
  document.getElementById('g-bar').style.width = pct + '%';
}

function updateCard(ai) {
  const s = albumStats(ai);
  const pct = s.tot > 0 ? Math.round(s.got / s.tot * 100) : 0;
  const card = document.querySelector('[data-ai="' + ai + '"]');
  if (!card) return;
  const fill = card.querySelector('.album-progress-fill');
  if (fill) fill.style.width = pct + '%';
  const pctEl = card.querySelector('.album-pct');
  if (pctEl) {
    if (s.done === s.count) { pctEl.textContent = '✓ Complete'; pctEl.className = 'album-pct done'; }
    else { pctEl.textContent = s.got + ' / ' + s.tot; pctEl.className = 'album-pct'; }
  }
  if (s.done === s.count) card.classList.add('complete'); else card.classList.remove('complete');
  ALBUMS[ai].p.forEach((p, pi) => {
    const row = card.querySelector('.puzzle-row[data-ai="' + ai + '"][data-pi="' + pi + '"]');
    if (!row) return;
    const shards = state[ai][pi] || [];
    const c = shards.filter(Boolean).length;
    const max = p[1];
    const done = c >= max;
    const cnt = row.querySelector('.puzzle-count');
    if (cnt) cnt.textContent = c + ' / ' + max;
    if (done) row.classList.add('done'); else row.classList.remove('done');
    shards.forEach((v, si) => {
      const pip = row.querySelector('.shard-pip[data-si="' + si + '"]');
      if (pip) { if (v) pip.classList.add('filled'); else pip.classList.remove('filled'); }
    });
  });
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function makeThumb(albumName) {
  const src = IMG_BASE + encodeURIComponent(albumName) + '.png';
  return `<div class="album-thumb"><img src="${src}" alt="${albumName}" onerror="this.classList.add('errored');this.parentElement.innerHTML='❄';"></div>`;
}

function buildPuzzleRow(ai, pi, q) {
  const p = ALBUMS[ai].p[pi];
  const shards = state[ai][pi] || [];
  const c = shards.filter(Boolean).length;
  const max = p[1];
  const done = c >= max;
  const highlight = q && p[0].toLowerCase().includes(q.toLowerCase()) ? ' style="background:rgba(46,137,200,0.08)"' : '';
  const pips = shards.map((v, si) =>
    `<div class="shard-pip${v?' filled':''}" data-ai="${ai}" data-pi="${pi}" data-si="${si}" title="Shard ${si+1}"><span class="shard-num">${si+1}</span></div>`
  ).join('');
  return `<div class="puzzle-row${done?' done':''}" data-ai="${ai}" data-pi="${pi}"${highlight}>
    <div class="puzzle-row-top">
      <span class="puzzle-name">${p[0]}</span>
      <span class="puzzle-count">${c} / ${max}</span>
      <button class="max-btn" data-maxone="${ai}" data-pi="${pi}">MAX</button>
    </div>
    <div class="shard-grid">${pips}</div>
  </div>`;
}

function buildGrid() {
  const grid = document.getElementById('album-grid');
  grid.innerHTML = '';
  let visible = 0;
  ALBUMS.forEach((album, ai) => {
    const s = albumStats(ai);
    const pct = s.tot > 0 ? Math.round(s.got / s.tot * 100) : 0;
    const isDone = s.done === s.count;
    const q = searchQ.toLowerCase();
    const nameMatch = album.name.toLowerCase().includes(q);
    const puzzleMatch = album.p.some(p => p[0].toLowerCase().includes(q));
    if (q && !nameMatch && !puzzleMatch) return;
    if (filter === 'complete' && !isDone) return;
    if (filter === 'incomplete' && isDone) return;
    visible++;
    const card = document.createElement('div');
    card.className = 'album-card' + (isDone?' complete':'') + (expanded?' open':'');
    card.dataset.ai = ai;
    const pctText = isDone ? '✓ Complete' : (s.got + ' / ' + s.tot);
    const pctCls = isDone ? 'album-pct done' : 'album-pct';
    card.innerHTML = `
      <div class="album-header">
        ${makeThumb(album.name)}
        <span class="album-num">#${String(ai+1).padStart(2,'0')}</span>
        <span class="album-name">${album.name}</span>
        <div class="album-meta">
          <span class="${pctCls}">${pctText}</span>
          <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="album-body">
        <div class="album-progress-bar"><div class="album-progress-fill" style="width:${pct}%"></div></div>
        <div class="album-actions">
          <button class="album-act-btn maxall" data-maxall="${ai}">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Max all
          </button>
          <button class="album-act-btn copyalb" data-copyalb="${ai}">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy missing
          </button>
          <button class="album-act-btn copyalb-trade" data-copyalbtrade="${ai}">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy tradeable
          </button>
        </div>
        <div class="puzzle-list">${album.p.map((_,pi) => buildPuzzleRow(ai, pi, q)).join('')}</div>
      </div>`;
    card.querySelector('.album-header').addEventListener('click', () => card.classList.toggle('open'));
    grid.appendChild(card);
  });
  if (visible === 0) {
    const e = document.createElement('div'); e.className = 'empty-state'; e.textContent = 'No albums match your search.'; grid.appendChild(e);
  }
}

// ═══════════════════════════════════════════════
// COPY / EXPORT / IMPORT
// ═══════════════════════════════════════════════
function buildMissingText(ai) {
  const album = ALBUMS[ai];
  const s = albumStats(ai);
  if (s.done === s.count) return `[${album.name}] — All complete! ✓`;
  const lines = [`[${album.name}] — missing shards:`];
  album.p.forEach((p, pi) => {
    const missing = (state[ai][pi]||[]).map((v,i)=>v?null:i+1).filter(v=>v!==null);
    if (missing.length > 0) lines.push(`  ${p[0]}: ${missing.join(', ')}`);
  });
  return lines.join('\n');
}

function buildAllMissingText() {
  const lines = ['Whiteout Survival — Missing Shards', ''];
  let anyMissing = false;
  ALBUMS.forEach((album, ai) => {
    const s = albumStats(ai);
    if (s.done === s.count) return;
    anyMissing = true;
    lines.push(`[${album.name}]`);
    album.p.forEach((p, pi) => {
      const missing = (state[ai][pi]||[]).map((v,i)=>v?null:i+1).filter(v=>v!==null);
      if (missing.length > 0) lines.push(`  ${p[0]}: ${missing.join(', ')}`);
    });
    lines.push('');
  });
  if (!anyMissing) lines.push('All shards collected! ✓');
  return lines.join('\n');
}

function buildMissingTradeableText(ai) {
  const album = ALBUMS[ai];
  const s = albumStats(ai);
  if (s.done === s.count) return `[${album.name}] — All complete! ✓`;
  const lines = [`[${album.name}] — missing tradeable shards:`];
  album.p.forEach((p, pi) => {
    const missing = (state[ai][pi]||[]).map((v,i)=>v?null:i+1).filter(n=>n!==null&&!isFiveStar(ai,pi,n));
    if (missing.length > 0) lines.push(`  ${p[0]}: ${missing.join(', ')}`);
  });
  return lines.join('\n');
}

function buildAllMissingTradeableText() {
  const lines = ['Whiteout Survival — Missing Tradeable Shards', ''];
  let anyMissing = false;
  ALBUMS.forEach((album, ai) => {
    const s = albumStats(ai);
    if (s.done === s.count) return;
    let albumLines = [];
    album.p.forEach((p, pi) => {
      const missing = (state[ai][pi]||[]).map((v,i)=>v?null:i+1).filter(n=>n!==null&&!isFiveStar(ai,pi,n));
      if (missing.length > 0) albumLines.push(`  ${p[0]}: ${missing.join(', ')}`);
    });
    if (albumLines.length > 0) {
      anyMissing = true;
      lines.push(`[${album.name}]`);
      lines.push(...albumLines);
      lines.push('');
    }
  });
  if (!anyMissing) lines.push('All tradeable shards collected! ✓');
  return lines.join('\n');
}

document.getElementById('btn-copy').addEventListener('click', () => {
  navigator.clipboard.writeText(buildAllMissingText()).then(() => toast('Missing shards copied!')).catch(() => toast('Copy failed'));
});
document.getElementById('btn-copy-tradeable').addEventListener('click', () => {
  navigator.clipboard.writeText(buildAllMissingTradeableText()).then(() => toast('Tradeable shards copied!')).catch(() => toast('Copy failed'));
});
document.getElementById('btn-export').addEventListener('click', () => {
  const payload = { version: 4, exported: new Date().toISOString(), state };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ws-album-tracker-' + new Date().toISOString().slice(0,10) + '.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Progress exported!');
});
document.getElementById('btn-import').addEventListener('click', () => document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const payload = JSON.parse(ev.target.result);
      const imported = payload.state || payload;
      let valid = true;
      ALBUMS.forEach((_,ai) => { if (!imported[ai]) valid = false; });
      if (!valid) throw new Error('Invalid file format');
      if (!confirm('Import this save? Your current progress will be replaced.')) return;
      state = imported;
      normaliseState();
      save();
      buildGrid();
      updateGlobal();
      toast('Progress imported!');
    } catch(err) { toast('Import failed — invalid file'); }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ═══════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════
document.getElementById('album-grid').addEventListener('click', e => {
  const pip = e.target.closest('.shard-pip');
  if (pip) {
    const ai=+pip.dataset.ai, pi=+pip.dataset.pi, si=+pip.dataset.si;
    state[ai][pi][si] = !state[ai][pi][si];
    save(); updateCard(ai); updateGlobal(); return;
  }
  const mOne = e.target.closest('.max-btn');
  if (mOne) {
    const ai=+mOne.dataset.maxone, pi=+mOne.dataset.pi;
    state[ai][pi] = state[ai][pi].map(()=>true);
    save(); updateCard(ai); updateGlobal(); return;
  }
  const mAll = e.target.closest('[data-maxall]');
  if (mAll) {
    const ai=+mAll.dataset.maxall;
    ALBUMS[ai].p.forEach((_,pi) => { state[ai][pi]=state[ai][pi].map(()=>true); });
    save(); updateCard(ai); updateGlobal(); return;
  }
  const cAlb = e.target.closest('[data-copyalb]');
  if (cAlb) {
    navigator.clipboard.writeText(buildMissingText(+cAlb.dataset.copyalb)).then(()=>toast('Missing shards copied!')).catch(()=>toast('Copy failed'));
    return;
  }
  const cAlbTrade = e.target.closest('[data-copyalbtrade]');
  if (cAlbTrade) {
    navigator.clipboard.writeText(buildMissingTradeableText(+cAlbTrade.dataset.copyalbtrade)).then(()=>toast('Tradeable shards copied!')).catch(()=>toast('Copy failed'));
    return;
  }
}, true);

document.getElementById('btn-reset').addEventListener('click', () => {
  if (!confirm('Reset all shard progress? This cannot be undone.')) return;
  ALBUMS.forEach((_,ai) => ALBUMS[ai].p.forEach((p,pi) => { state[ai][pi]=Array(p[1]).fill(false); }));
  save(); buildGrid(); updateGlobal(); toast('Progress reset.');
});

document.getElementById('btn-expand').addEventListener('click', () => {
  expanded = !expanded;
  document.querySelectorAll('.album-card').forEach(c => { if (expanded) c.classList.add('open'); else c.classList.remove('open'); });
  document.getElementById('btn-expand').innerHTML = expanded
    ? `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg> Collapse all`
    : `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg> Expand all`;
});

document.querySelectorAll('.fbtn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filter = b.dataset.f;
    buildGrid();
  });
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  if (searchQ) expanded = true;
  buildGrid();
});

// TOAST

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════
// SNOW
// ═══════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('snow-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, flakes = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  for (let i = 0; i < 80; i++) {
    flakes.push({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, r: 0.8+Math.random()*2.2, speed: 0.3+Math.random()*0.8, drift: (Math.random()-0.5)*0.3, opacity: 0.2+Math.random()*0.5 });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    flakes.forEach(f => {
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,215,255,${f.opacity})`; ctx.fill();
      f.y+=f.speed; f.x+=f.drift;
      if (f.y>H+5){f.y=-5;f.x=Math.random()*W;}
      if (f.x>W+5) f.x=-5; if (f.x<-5) f.x=W+5;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
async function init() {
  load();
  buildGrid();
  updateGlobal();
  document.getElementById('page-trade').style.display = 'none';

  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    updateAccountUI();
    await pullFromCloud();
    await loadTradeProfile();
    updateTradeProfileBanner();
  }

  sb.auth.onAuthStateChange((_event, session) => {
    currentUser = session?.user ?? null;
    updateAccountUI();
    if (!currentUser) {
      tradeProfile = null;
      tradePlayersCache = null;
      updateTradeProfileBanner();
    }
  });
}

init();
